---
# Grafana Monitoring Dashboard for vLLM Inference
# Deploys Grafana with pre-configured Prometheus datasource and a vLLM
# inference dashboard. Panels cover request latency (P50/P95/P99),
# throughput (req/s, tokens/s), GPU memory utilization, KV cache usage,
# batch size distribution, and queue depth.
#
# Requirements: 12.3, 12.4
#
# Datasource provisioning ConfigMap — tells Grafana where Prometheus lives.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  labels:
    app: vllm-advanced-server
    component: grafana
    part-of: hyperpod-eks-vllm-advanced
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
# Dashboard provisioning ConfigMap — tells Grafana to load dashboards from disk.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  labels:
    app: vllm-advanced-server
    component: grafana
    part-of: hyperpod-eks-vllm-advanced
data:
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
# Dashboard JSON ConfigMap — the actual vLLM inference dashboard definition.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  labels:
    app: vllm-advanced-server
    component: grafana
    part-of: hyperpod-eks-vllm-advanced
data:
  vllm-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Request Latency — P50 / P95 / P99",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(vllm:request_duration_seconds_bucket[5m]))",
              "legendFormat": "P50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, rate(vllm:request_duration_seconds_bucket[5m]))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, rate(vllm:request_duration_seconds_bucket[5m]))",
              "legendFormat": "P99",
              "refId": "C"
            }
          ]
        },
        {
          "title": "Throughput — Requests / sec",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "reqps" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(vllm:request_success_total[5m])",
              "legendFormat": "req/s",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Token Throughput — Tokens / sec",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(vllm:generation_tokens_total[5m])",
              "legendFormat": "tokens/s",
              "refId": "A"
            }
          ]
        },
        {
          "title": "GPU Memory Utilization",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1, "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 0.7 }, { "color": "red", "value": 0.9 } ] } },
            "overrides": []
          },
          "targets": [
            {
              "expr": "vllm:gpu_cache_usage_perc",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "KV Cache Utilization",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1 },
            "overrides": []
          },
          "targets": [
            {
              "expr": "vllm:gpu_cache_usage_perc",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Batch Size (Running Requests)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "vllm:num_requests_running",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Queue Depth (Waiting Requests)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "vllm:num_requests_waiting",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["vllm", "inference", "hyperpod"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "vLLM Inference Dashboard",
      "uid": "vllm-advanced",
      "version": 1
    }
---
# Grafana Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: vllm-advanced-server
    component: grafana
    part-of: hyperpod-eks-vllm-advanced
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-advanced-server
      component: grafana
  template:
    metadata:
      labels:
        app: vllm-advanced-server
        component: grafana
        part-of: hyperpod-eks-vllm-advanced
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            # Disable login requirement for local/dev usage
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
          resources:
            limits:
              memory: 512Mi
            requests:
              memory: 256Mi
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-json
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: datasource
          configMap:
            name: grafana-datasource
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-json
          configMap:
            name: grafana-dashboard-json
        - name: data
          emptyDir: {}
---
# Grafana Service
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app: vllm-advanced-server
    component: grafana
    part-of: hyperpod-eks-vllm-advanced
spec:
  selector:
    app: vllm-advanced-server
    component: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
