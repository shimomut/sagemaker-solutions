---
# Redis Cache for vLLM L3 Cache Layer
# Single-node Redis with persistent storage for caching prompt metadata
# (prefix hashes, token counts, routing hints) across vLLM instances.
# No authentication configured (internal cluster use only).
#
# Requirements: 9.1, 9.2
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  labels:
    app: vllm-advanced-server
    component: redis
    part-of: hyperpod-eks-vllm-advanced
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: vllm-advanced-server
    component: redis
    part-of: hyperpod-eks-vllm-advanced
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-advanced-server
      component: redis
  template:
    metadata:
      labels:
        app: vllm-advanced-server
        component: redis
        part-of: hyperpod-eks-vllm-advanced
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            limits:
              memory: 512Mi
            requests:
              memory: 256Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: vllm-advanced-server
    component: redis
    part-of: hyperpod-eks-vllm-advanced
spec:
  selector:
    app: vllm-advanced-server
    component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
