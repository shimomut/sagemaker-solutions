---
# vLLM Advanced Inference Server Service
# Exposes the vLLM API within the VPC via NodePort on port 8000.
# Label selector matches the vllm-deployment.yaml pod labels.
#
# Requirements: 5.1, 5.2, 5.3
apiVersion: v1
kind: Service
metadata:
  name: vllm-advanced-server
  labels:
    app: vllm-advanced-server
    component: vllm
    part-of: hyperpod-eks-vllm-advanced
spec:
  type: NodePort
  selector:
    app: vllm-advanced-server
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
