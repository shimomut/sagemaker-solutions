---
# Prometheus Monitoring for vLLM Inference
# Deploys Prometheus with Kubernetes service discovery to automatically
# scrape /metrics from all vLLM pods. Provides the metrics backend for
# Grafana dashboards and HPA autoscaling via Prometheus Adapter.
#
# Requirements: 12.1, 12.2, 12.5
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: vllm-advanced-server
    component: prometheus
    part-of: hyperpod-eks-vllm-advanced
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "vllm"
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Keep only pods with label app=vllm-advanced-server
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: vllm-advanced-server
          # Use the pod name as the instance label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
          # Carry over the component label
          - source_labels: [__meta_kubernetes_pod_label_component]
            target_label: component
          # Set the scrape port to 8000 (vLLM API port)
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: "$1:8000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app: vllm-advanced-server
    component: prometheus
    part-of: hyperpod-eks-vllm-advanced
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-advanced-server
      component: prometheus
  template:
    metadata:
      labels:
        app: vllm-advanced-server
        component: prometheus
        part-of: hyperpod-eks-vllm-advanced
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          resources:
            limits:
              memory: 1Gi
            requests:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app: vllm-advanced-server
    component: prometheus
    part-of: hyperpod-eks-vllm-advanced
spec:
  selector:
    app: vllm-advanced-server
    component: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      protocol: TCP
