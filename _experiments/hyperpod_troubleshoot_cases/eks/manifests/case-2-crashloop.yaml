# Container whose entrypoint exits 1 immediately. kubelet's exponential
# back-off marks the pod CrashLoopBackOff after a few restarts.
apiVersion: v1
kind: Pod
metadata:
  name: crashloop-pod
  labels:
    app: hp-troubleshoot
    case: crashloop
spec:
  restartPolicy: Always
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - |
          echo "starting up..."
          echo "config check: missing required env CONFIG_PATH" >&2
          sleep 2
          exit 1
