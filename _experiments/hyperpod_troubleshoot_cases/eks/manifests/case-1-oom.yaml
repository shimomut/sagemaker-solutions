# Pod that allocates ~256MiB against a 64MiB memory limit. The kernel OOM-killer
# terminates the container; kubelet restarts it; status becomes OOMKilled and
# eventually CrashLoopBackOff.
apiVersion: v1
kind: Pod
metadata:
  name: oom-pod
  labels:
    app: hp-troubleshoot
    case: oom
spec:
  restartPolicy: Always
  containers:
    - name: stress
      image: polinux/stress:latest
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "256M", "--vm-hang", "0"]
      resources:
        limits:
          memory: "64Mi"
        requests:
          memory: "32Mi"
