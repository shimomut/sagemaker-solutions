AWSTemplateFormatVersion: '2010-09-09'

Description: "AWS DevOps Agent + HyperPod foundation: IAM roles, Agent Space (with IAM operator app), and the AWS monitoring association."

Parameters:

  AgentSpaceRoleName:
    Type: String
    Default: "DevOpsAgentRole-AgentSpace"
    Description: "Name of the role assumed by aidevops.amazonaws.com to read AWS resources during investigations."

  WebappRoleName:
    Type: String
    Default: "DevOpsAgentRole-WebappAdmin"
    Description: "Name of the role backing the Operator web app."

  AgentSpaceName:
    Type: String
    Description: "Friendly name for the Agent Space (e.g. hyperpod-<cluster>-devops-agent)."
    MinLength: 1
    MaxLength: 255

  AgentSpaceDescription:
    Type: String
    Default: "AWS DevOps Agent monitoring a HyperPod cluster."
    Description: "Free-text description shown in the console."
    MinLength: 1
    MaxLength: 1000

Resources:

  AgentSpaceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref AgentSpaceRoleName
      Description: "AWS DevOps Agent monitoring role (managed by hyperpod_devops_agent solution)."
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: aidevops.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                "aws:SourceAccount": !Sub "${AWS::AccountId}"
              ArnLike:
                "aws:SourceArn": !Sub "arn:aws:aidevops:${AWS::Region}:${AWS::AccountId}:agentspace/*"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AIDevOpsAgentAccessPolicy"
      Policies:
        - PolicyName: AllowCreateServiceLinkedRoles
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowResourceExplorerServiceLinkedRole
                Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/resource-explorer-2.amazonaws.com/AWSServiceRoleForResourceExplorer"

  WebappRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref WebappRoleName
      Description: "AWS DevOps Agent Operator web app role (managed by hyperpod_devops_agent solution)."
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: aidevops.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
            Condition:
              StringEquals:
                "aws:SourceAccount": !Sub "${AWS::AccountId}"
              ArnLike:
                "aws:SourceArn": !Sub "arn:aws:aidevops:${AWS::Region}:${AWS::AccountId}:agentspace/*"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AIDevOpsOperatorAppAccessPolicy"

  AgentSpace:
    Type: AWS::DevOpsAgent::AgentSpace
    Properties:
      Name: !Ref AgentSpaceName
      Description: !Ref AgentSpaceDescription
      OperatorApp:
        Iam:
          OperatorAppRoleArn: !GetAtt WebappRole.Arn

  AwsMonitorAssociation:
    Type: AWS::DevOpsAgent::Association
    Properties:
      AgentSpaceId: !GetAtt AgentSpace.AgentSpaceId
      ServiceId: aws
      Configuration:
        Aws:
          AccountId: !Sub "${AWS::AccountId}"
          AccountType: monitor
          AssumableRoleArn: !GetAtt AgentSpaceRole.Arn

Outputs:

  AgentSpaceRoleArn:
    Value: !GetAtt AgentSpaceRole.Arn
    Description: "ARN of the Agent Space monitoring role. Use as the EKS access-entry principal."

  WebappRoleArn:
    Value: !GetAtt WebappRole.Arn
    Description: "ARN of the Webapp Admin role."

  AgentSpaceId:
    Value: !GetAtt AgentSpace.AgentSpaceId
    Description: "Unique identifier of the Agent Space. Pass to skill upload + webhook association steps."

  AgentSpaceArn:
    Value: !GetAtt AgentSpace.Arn
    Description: "ARN of the Agent Space."

  AwsAssociationId:
    Value: !GetAtt AwsMonitorAssociation.AssociationId
    Description: "ID of the AWS monitor account association."
