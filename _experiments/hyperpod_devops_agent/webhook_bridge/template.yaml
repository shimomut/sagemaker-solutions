# Bridges SageMaker HyperPod EventBridge events to the AWS DevOps Agent
# generic webhook. The webhook URL and HMAC secret must already exist in
# Secrets Manager as a JSON value {"url": "...", "secret": "..."}; pass
# its ARN via the WebhookSecretArn parameter.

AWSTemplateFormatVersion: '2010-09-09'

Description: "Bridge HyperPod EventBridge events to AWS DevOps Agent webhook."

Parameters:

  WebhookSecretArn:
    Type: String
    Description: "ARN of a Secrets Manager secret holding {\"url\":\"...\",\"secret\":\"...\"} for the DevOps Agent generic webhook."

  ClusterFilter:
    Type: String
    Default: ""
    Description: "Comma-separated allowlist of HyperPod cluster names to forward. Empty = forward events from all clusters in the account/region."

  DropEventLevels:
    Type: String
    Default: "Info"
    Description: "Comma-separated EventLevel values to drop (HyperPod 'Cluster Event' detail-type only). Default drops noisy Info-level events."

Resources:

  WebhookBridgeLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WebhookBridgeLambdaExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref WebhookSecretArn

              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - "arn:aws:logs:*:*:log-group:/aws/lambda/*"
                  - "arn:aws:logs:*:*:log-group:/aws/lambda/*:log-stream:*"

  EventBridgeTargetRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeInvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt WebhookBridgeLambdaFunction.Arn

  WebhookBridgeLambdaFunction:
    DependsOn: WebhookBridgeLambdaExecutionRole
    Type: AWS::Lambda::Function
    Properties:
      Role: !GetAtt WebhookBridgeLambdaExecutionRole.Arn
      Runtime: python3.13
      Handler: index.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          WEBHOOK_SECRET_ARN: !Ref WebhookSecretArn
          WEBHOOK_CLUSTER_FILTER: !Ref ClusterFilter
          WEBHOOK_DROP_EVENT_LEVELS: !Ref DropEventLevels
      Code:
        ZipFile: |
          # LAMBDA_CODE_PLACEHOLDER

  HyperPodEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Route all HyperPod cluster events to the DevOps Agent webhook bridge."
      State: ENABLED
      EventPattern: |
        {
          "source": ["aws.sagemaker"],
          "detail-type": [
            "SageMaker HyperPod Cluster State Change",
            "SageMaker HyperPod Cluster Node Health Event",
            "SageMaker HyperPod Cluster Event"
          ]
        }
      Targets:
        - Arn: !GetAtt WebhookBridgeLambdaFunction.Arn
          Id: "WebhookBridgeLambdaTarget"
          RoleArn: !GetAtt EventBridgeTargetRole.Arn

Outputs:

  LambdaFunctionName:
    Value: !Ref WebhookBridgeLambdaFunction
    Description: "Name of the deployed webhook bridge Lambda function."

  EventRuleName:
    Value: !Ref HyperPodEventRule
    Description: "Name of the HyperPod EventBridge rule."
