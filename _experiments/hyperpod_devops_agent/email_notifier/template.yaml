AWSTemplateFormatVersion: '2010-09-09'

Description: "Email notification for AWS DevOps Agent investigation lifecycle events via SES."

Parameters:

  EmailSender:
    Type: String
    Description: "SES-verified From address (must be verified in this region's SES)."

  EmailRecipients:
    Type: String
    Description: "Comma-separated list of recipient email addresses. Each must be verified if SES is in sandbox mode."

  EmailDetailTypes:
    Type: String
    Default: "Investigation Completed"
    Description: "Comma-separated EventBridge detail-types to send on. Default: Completed only (one email per incident lifecycle)."

  ConsoleUrlTemplate:
    Type: String
    Default: "https://%agent_space_id%.aidevops.global.app.aws/investigation/%task_id%"
    Description: "Optional URL template included in emails. Tokens: %region%, %account%, %agent_space_id%, %task_id%."

  ForceSend:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: "If true, bypass all filters (dedup, no-findings, suppress). Useful for debugging."

  MarkerExpirationDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 365
    Description: "How many days to retain per-execution email markers in the dedup bucket before auto-expiring them."

Resources:

  # Dedup marker bucket: one small S3 object per execution_id that we've
  # already emailed. On each Investigation Completed event the Lambda does a
  # HeadObject; a 200 means we've already emailed for this execution and the
  # event is dropped. Prevents duplicate emails when DevOps Agent re-emits
  # Investigation Completed events for the same execution.
  MarkerBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "hyperpod-devops-agent-email-markers-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldMarkers
            Status: Enabled
            ExpirationInDays: !Ref MarkerExpirationDays

  EmailNotifierExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EmailNotifierExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - "arn:aws:logs:*:*:log-group:/aws/lambda/*"
                  - "arn:aws:logs:*:*:log-group:/aws/lambda/*:log-stream:*"
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
                Condition:
                  StringEquals:
                    "ses:FromAddress": !Ref EmailSender
              - Effect: Allow
                Action:
                  - aidevops:GetBacklogTask
                  - aidevops:ListJournalRecords
                Resource: "*"
              # Scoped to the marker bucket only. HeadObject is technically
              # covered by GetObject on S3's side. ListBucket is added so
              # HeadObject on a missing key returns 404 instead of 403 (S3
              # returns 403 to callers that lack ListBucket on the bucket).
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "${MarkerBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt MarkerBucket.Arn

  EmailNotifierFunction:
    DependsOn: EmailNotifierExecutionRole
    Type: AWS::Lambda::Function
    Properties:
      Role: !GetAtt EmailNotifierExecutionRole.Arn
      Runtime: python3.13
      Handler: index.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          EMAIL_SENDER: !Ref EmailSender
          EMAIL_RECIPIENTS: !Ref EmailRecipients
          EMAIL_DETAIL_TYPES: !Ref EmailDetailTypes
          CONSOLE_URL_TEMPLATE: !Ref ConsoleUrlTemplate
          FORCE_SEND: !Ref ForceSend
          MARKER_BUCKET: !Ref MarkerBucket
          MARKER_PREFIX: "emailed/"
      Code:
        ZipFile: |
          # LAMBDA_CODE_PLACEHOLDER

  EventBridgeTargetRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeInvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt EmailNotifierFunction.Arn

  InvestigationLifecycleRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Route DevOps Agent investigation lifecycle events to the email notifier."
      State: ENABLED
      EventPattern:
        source:
          - aws.aidevops
        detail-type:
          - prefix: "Investigation"
      Targets:
        - Arn: !GetAtt EmailNotifierFunction.Arn
          Id: "EmailNotifierTarget"
          RoleArn: !GetAtt EventBridgeTargetRole.Arn

Outputs:

  LambdaFunctionName:
    Value: !Ref EmailNotifierFunction
    Description: "Name of the deployed email notifier Lambda function."

  EventRuleName:
    Value: !Ref InvestigationLifecycleRule
    Description: "Name of the EventBridge rule on aws.aidevops investigations."

  MarkerBucketName:
    Value: !Ref MarkerBucket
    Description: "S3 bucket where per-execution email dedup markers are stored."
