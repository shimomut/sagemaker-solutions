AWSTemplateFormatVersion: '2010-09-09'
Description: >
  VPC with 3 subnets and VPC endpoints for HyperPod EKS cluster with RIG.
  No Internet Gateway or NAT Gateway - verifying RIG works without internet access.

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC

  HyperPodSubnetCidr:
    Type: String
    Default: 10.0.0.0/21
    Description: CIDR block for the HyperPod nodes subnet (/21 = 2046 hosts)

  EksSubnet1Cidr:
    Type: String
    Default: 10.0.8.0/26
    Description: CIDR block for EKS cluster subnet 1 (/26 = 62 hosts)

  EksSubnet2Cidr:
    Type: String
    Default: 10.0.8.64/26
    Description: CIDR block for EKS cluster subnet 2 (/26 = 62 hosts)

  HyperPodSubnetAz:
    Type: String
    Description: Availability zone ID for the HyperPod nodes subnet (e.g., usw2-az3)

  EksSubnet1Az:
    Type: String
    Description: Availability zone ID for EKS cluster subnet 1 (e.g., usw2-az3)

  EksSubnet2Az:
    Type: String
    Description: Availability zone ID for EKS cluster subnet 2 (e.g., usw2-az1)

  KubernetesVersion:
    Type: String
    Default: '1.32'
    Description: Kubernetes version for the EKS cluster

  EnableInternetAccess:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable internet access via Internet Gateway and NAT Gateway

  PublicSubnetCidr:
    Type: String
    Default: 10.0.9.0/28
    Description: CIDR block for the public subnet (used for NAT Gateway)

Conditions:
  InternetAccessEnabled: !Equals [!Ref EnableInternetAccess, 'true']

Resources:

  # VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'

  # Subnets
  HyperPodSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref HyperPodSubnetCidr
      AvailabilityZoneId: !Ref HyperPodSubnetAz
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-hyperpod-subnet'

  EksSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref EksSubnet1Cidr
      AvailabilityZoneId: !Ref EksSubnet1Az
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-eks-subnet-1'

  EksSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref EksSubnet2Cidr
      AvailabilityZoneId: !Ref EksSubnet2Az
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-eks-subnet-2'

  # Route Tables
  HyperPodRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-hyperpod-rt'

  EksRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-eks-rt'

  HyperPodSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref HyperPodSubnet
      RouteTableId: !Ref HyperPodRouteTable

  EksSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref EksSubnet1
      RouteTableId: !Ref EksRouteTable

  EksSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref EksSubnet2
      RouteTableId: !Ref EksRouteTable

  # Internet Access (conditional)

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Condition: InternetAccessEnabled
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZoneId: !Ref EksSubnet1Az
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-subnet'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: InternetAccessEnabled
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-igw'

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: InternetAccessEnabled
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  NatGatewayEip:
    Type: AWS::EC2::EIP
    Condition: InternetAccessEnabled
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-nat-eip'

  NatGateway:
    Type: AWS::EC2::NatGateway
    Condition: InternetAccessEnabled
    Properties:
      AllocationId: !GetAtt NatGatewayEip.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-nat-gw'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: InternetAccessEnabled
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-rt'

  PublicRoute:
    Type: AWS::EC2::Route
    Condition: InternetAccessEnabled
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: InternetAccessEnabled
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  HyperPodNatRoute:
    Type: AWS::EC2::Route
    Condition: InternetAccessEnabled
    Properties:
      RouteTableId: !Ref HyperPodRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  EksNatRoute:
    Type: AWS::EC2::Route
    Condition: InternetAccessEnabled
    Properties:
      RouteTableId: !Ref EksRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  # Shared Security Group for VPC endpoints and HyperPod/EKS nodes
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Shared security group for VPC endpoints and HyperPod/EKS nodes
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: '-1'
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0
          Description: Allow traffic to internet
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  SecurityGroupIngressSelf:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: '-1'
      SourceSecurityGroupId: !Ref SecurityGroup

  SecurityGroupEgressSelf:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: '-1'
      DestinationSecurityGroupId: !Ref SecurityGroup

  # Likely redundant since SecurityGroupEgress already allows 0.0.0.0/0,
  # but keeping it to verify whether the cluster creation issue still reproduces.
  SecurityGroupEgressS3:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      DestinationPrefixListId: pl-68a54001  # com.amazonaws.us-west-2.s3
      Description: Allow HTTPS egress to S3 via gateway endpoint

  SecurityGroupIngressVpcEndpoints:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: !Ref VpcCidr

  SecurityGroupIngressFsxLustre988:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: tcp
      FromPort: 988
      ToPort: 988
      SourceSecurityGroupId: !Ref SecurityGroup
      Description: Allows Lustre traffic between FSx for Lustre file servers and Lustre clients

  SecurityGroupIngressFsxLustre1018To1023:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: tcp
      FromPort: 1018
      ToPort: 1023
      SourceSecurityGroupId: !Ref SecurityGroup
      Description: Allows Lustre traffic between FSx for Lustre file servers and Lustre clients

  # VPC Endpoints

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref HyperPodRouteTable
        - !Ref EksRouteTable

  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.api'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref EksSubnet1
        - !Ref EksSubnet2
      SecurityGroupIds:
        - !Ref SecurityGroup

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.dkr'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref EksSubnet1
        - !Ref EksSubnet2
      SecurityGroupIds:
        - !Ref SecurityGroup

  SsmEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ssm'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref EksSubnet1
        - !Ref EksSubnet2
      SecurityGroupIds:
        - !Ref SecurityGroup

  Ec2MessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ec2messages'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref EksSubnet1
        - !Ref EksSubnet2
      SecurityGroupIds:
        - !Ref SecurityGroup

  SsmMessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ssmmessages'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref EksSubnet1
        - !Ref EksSubnet2
      SecurityGroupIds:
        - !Ref SecurityGroup

  Ec2Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ec2'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref EksSubnet1
        - !Ref EksSubnet2
      SecurityGroupIds:
        - !Ref SecurityGroup

  StsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.sts'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref EksSubnet1
        - !Ref EksSubnet2
      SecurityGroupIds:
        - !Ref SecurityGroup

  LogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.logs'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref EksSubnet1
        - !Ref EksSubnet2
      SecurityGroupIds:
        - !Ref SecurityGroup

  MonitoringEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.monitoring'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref EksSubnet1
        - !Ref EksSubnet2
      SecurityGroupIds:
        - !Ref SecurityGroup

  EksAuthEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.eks-auth'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref EksSubnet1
        - !Ref EksSubnet2
      SecurityGroupIds:
        - !Ref SecurityGroup

  # EKS Cluster

  EksClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-eks-cluster-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  EksCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub '${AWS::StackName}-eks'
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt EksClusterRole.Arn
      AccessConfig:
        AuthenticationMode: API_AND_CONFIG_MAP
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref EksSubnet1
          - !Ref EksSubnet2
        SecurityGroupIds:
          - !Ref SecurityGroup
        EndpointPublicAccess: true
        EndpointPrivateAccess: true
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator
            - Type: controllerManager
            - Type: scheduler

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  HyperPodSubnetId:
    Description: Subnet ID for HyperPod nodes
    Value: !Ref HyperPodSubnet

  EksSubnet1Id:
    Description: Subnet ID for EKS cluster (AZ1)
    Value: !Ref EksSubnet1

  EksSubnet2Id:
    Description: Subnet ID for EKS cluster (AZ2)
    Value: !Ref EksSubnet2

  SecurityGroupId:
    Description: Shared security group ID for VPC endpoints and HyperPod/EKS nodes
    Value: !Ref SecurityGroup

  EksClusterName:
    Description: EKS cluster name
    Value: !Ref EksCluster

  EksClusterArn:
    Description: EKS cluster ARN
    Value: !GetAtt EksCluster.Arn
