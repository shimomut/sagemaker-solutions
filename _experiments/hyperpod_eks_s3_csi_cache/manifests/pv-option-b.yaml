# Option B: ephemeral local cache backed by the DLAMI NVMe filesystem
# (/opt/dlami/nvme), exposed as local PVs by the Local Volume Static Provisioner
# in hostDir mode (StorageClass: ${NVME_STORAGE_CLASS}).
# Rendered by scripts/render.py (placeholders come from the Makefile / environment).
#
# Prerequisites (see README Option B):
#   1. manifests/nvme-cache-setup-daemonset.yaml  (bind-mounts dirs on /opt/dlami/nvme)
#   2. manifests/nvme-cache-provisioner.yaml      (publishes them as ${NVME_STORAGE_CLASS} PVs)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ${PV_NAME}
spec:
  capacity:
    storage: 1200Gi          # ignored by the CSI driver, required by Kubernetes
  accessModes:
    - ReadOnlyMany
  mountOptions:
    - region ${AWS_REGION}
    - read-only
    - metadata-ttl indefinite
  storageClassName: ""
  claimRef:
    namespace: ${NAMESPACE}
    name: ${PVC_NAME}
  csi:
    driver: s3.csi.aws.com
    volumeHandle: ${VOLUME_HANDLE}
    volumeAttributes:
      bucketName: ${S3_BUCKET_NAME}
      # --- Ephemeral cache backed by dedicated local NVMe ---
      cache: ephemeral
      cacheEphemeralStorageClassName: ${NVME_STORAGE_CLASS}
      cacheEphemeralStorageResourceRequest: ${CACHE_EPHEMERAL_REQUEST}
