# Option B — step 1 of 2.
#
# The HyperPod DLAMI aggregates the local NVMe instance-store disks into a single
# LVM filesystem mounted at /opt/dlami/nvme (via dlami-nvme.service). The Local
# Volume Static Provisioner only discovers *mount points* in Filesystem mode, so
# this DaemonSet carves that shared filesystem into a few bind-mounted directories
# under a discovery directory (/mnt/s3-cache-disks) that the provisioner watches.
#
# Doing this from a privileged DaemonSet (rather than the node lifecycle script)
# means Option B needs NO lifecycle-script edit and NO node recreation. The pod
# re-creates the bind mounts on restart, so they survive reboots.
#
# References:
#   https://github.com/kubernetes-sigs/sig-storage-local-static-provisioner/blob/master/docs/operations.md
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvme-cache-setup
  namespace: kube-system
  labels:
    app: nvme-cache-setup
spec:
  selector:
    matchLabels:
      app: nvme-cache-setup
  template:
    metadata:
      labels:
        app: nvme-cache-setup
    spec:
      # Only run on nodes that actually have the DLAMI NVMe mount. Adjust the
      # nodeSelector to target your NVMe instance types.
      nodeSelector:
        node.kubernetes.io/instance-type: ml.g6.8xlarge
      tolerations:
        - operator: Exists
      hostPID: false
      containers:
        - name: setup
          image: public.ecr.aws/docker/library/busybox:1.36
          securityContext:
            privileged: true
          env:
            - name: NUM_VOLS
              value: "4"                      # number of cache PVs to expose per node
            - name: NVME_ROOT
              value: /host/opt/dlami/nvme     # DLAMI NVMe mount (inside container)
            - name: DISCOVERY_DIR
              value: /host/mnt/s3-cache-disks # provisioner discovery dir (inside container)
          command:
            - /bin/sh
            - -c
            - |
              set -e
              SRC="$NVME_ROOT/s3-cache-src"
              mkdir -p "$SRC"
              i=1
              while [ "$i" -le "$NUM_VOLS" ]; do
                mkdir -p "$SRC/vol$i" "$DISCOVERY_DIR/vol$i"
                if ! mountpoint -q "$DISCOVERY_DIR/vol$i"; then
                  mount --bind "$SRC/vol$i" "$DISCOVERY_DIR/vol$i"
                  echo "bind-mounted $SRC/vol$i -> $DISCOVERY_DIR/vol$i"
                else
                  echo "$DISCOVERY_DIR/vol$i already a mount point"
                fi
                i=$((i + 1))
              done
              echo "nvme-cache-setup ready; holding."
              # Keep running so the mounts persist and are re-created after restarts.
              while true; do sleep 3600; done
          volumeMounts:
            - name: nvme
              mountPath: /host/opt/dlami/nvme
              mountPropagation: Bidirectional
            - name: discovery
              mountPath: /host/mnt/s3-cache-disks
              mountPropagation: Bidirectional
      volumes:
        - name: nvme
          hostPath:
            path: /opt/dlami/nvme
            type: Directory
        - name: discovery
          hostPath:
            path: /mnt/s3-cache-disks
            type: DirectoryOrCreate
