# Option B — step 2 of 2.
#
# Local Volume Static Provisioner (v2.8.0) configured in Filesystem / hostDir mode.
# It discovers the bind-mounted directories created by nvme-cache-setup-daemonset
# under /mnt/s3-cache-disks and publishes them as PersistentVolumes in the
# StorageClass "nvme-cache".
#
# This is a hostDir-mode adaptation of the upstream example; it does NOT use raw
# block devices (the DLAMI already owns the NVMe disks via LVM).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: local-static-provisioner
  namespace: kube-system
  labels:
    app.kubernetes.io/name: local-static-provisioner
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-static-provisioner-config
  namespace: kube-system
  labels:
    app.kubernetes.io/name: local-static-provisioner
data:
  storageClassMap: |
    nvme-cache:
      hostDir: /mnt/s3-cache-disks
      mountDir: /mnt/s3-cache-disks
      volumeMode: Filesystem
      fsType: ext4
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nvme-cache
  labels:
    app.kubernetes.io/name: local-static-provisioner
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: local-static-provisioner-node-clusterrole
  labels:
    app.kubernetes.io/name: local-static-provisioner
rules:
- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["", "events.k8s.io"]
  resources: ["events"]
  verbs: ["watch", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: local-static-provisioner-node-binding
  labels:
    app.kubernetes.io/name: local-static-provisioner
subjects:
- kind: ServiceAccount
  name: local-static-provisioner
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: local-static-provisioner-node-clusterrole
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: local-static-provisioner
  namespace: kube-system
  labels:
    app.kubernetes.io/name: local-static-provisioner
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: local-static-provisioner
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: local-static-provisioner
    spec:
      serviceAccountName: local-static-provisioner
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - operator: Exists
      containers:
        - name: provisioner
          image: registry.k8s.io/sig-storage/local-volume-provisioner:v2.8.0
          securityContext:
            privileged: true
          env:
          - name: MY_NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: MY_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: JOB_CONTAINER_IMAGE
            value: registry.k8s.io/sig-storage/local-volume-provisioner:v2.8.0
          ports:
          - name: metrics
            containerPort: 8080
          volumeMounts:
            - name: provisioner-config
              mountPath: /etc/provisioner/config
              readOnly: true
            - name: cache-disks
              mountPath: /mnt/s3-cache-disks
              mountPropagation: HostToContainer
      volumes:
        - name: provisioner-config
          configMap:
            name: local-static-provisioner-config
        - name: cache-disks
          hostPath:
            path: /mnt/s3-cache-disks
            type: DirectoryOrCreate
