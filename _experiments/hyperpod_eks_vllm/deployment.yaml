apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  labels:
    app: vllm-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-server
  template:
    metadata:
      labels:
        app: vllm-server
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm-server
          image: 842413447717.dkr.ecr.us-west-2.amazonaws.com/hyperpod-eks-vllm:latest
          args:
            ## --- Pick one model block (uncomment one group) ---

            ## OPT 1.3B (~3 GB, no auth, text completion only)
            - "facebook/opt-1.3b"

            ## Mistral 7B (~15 GB, no auth, supports chat)
            #- "mistralai/Mistral-7B-Instruct-v0.3"

            ## Llama 3.1 8B (~17 GB, requires HF token, supports chat)
            #- "meta-llama/Llama-3.1-8B-Instruct"
            #- "--max-model-len"
            #- "4096"

            ## ---------------------------------------------------
            - "--tensor-parallel-size"
            - "1"
            - "--gpu-memory-utilization"
            - "0.9"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HUGGING_FACE_HUB_TOKEN
                  optional: true
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-server
  labels:
    app: vllm-server
spec:
  type: ClusterIP
  selector:
    app: vllm-server
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
